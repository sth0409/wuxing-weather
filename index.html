<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>五行穿衣指南</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 500px;
      margin: 0 auto;
      background: rgba(255,255,255,0.95);
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    .header { text-align: center; margin-bottom: 24px; position: relative; }
    .header h1 { font-size: 24px; color: #333; margin-bottom: 8px; display: inline-flex; align-items: center; gap: 8px; }
    .header .alert-icon { font-size: 28px; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); } }
    .header .date { font-size: 14px; color: #666; }
    .header .ganzhi { font-size: 18px; color: #764ba2; font-weight: bold; margin-top: 8px; }
    .date-nav {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin: 10px 0 2px;
      padding: 4px;
      border-radius: 999px;
      background: #f0f0f0;
    }
    .date-nav-btn {
      min-width: 34px;
      height: 30px;
      border: none;
      border-radius: 999px;
      background: white;
      color: #333;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      padding: 0 10px;
      transition: all 0.2s;
    }
    .date-nav-btn:hover { background: #764ba2; color: white; }
    .date-nav-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .date-nav-btn:disabled:hover { background: white; color: #333; }
    .date-nav-label { min-width: 44px; font-size: 13px; color: #666; font-weight: 600; }
    
    /* 顶部操作栏 */
    .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .city-name { font-size: 16px; font-weight: bold; color: #333; }
    .top-actions { display: flex; gap: 8px; }
    .icon-btn {
      width: 36px;
      height: 36px;
      border: none;
      border-radius: 50%;
      background: #f0f0f0;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    .icon-btn:hover { background: #e0e0e0; }
    .icon-btn.locating { animation: spin 1s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    
    /* 城市标签 */
    .city-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
    .city-tag {
      padding: 8px 16px;
      border: none;
      border-radius: 20px;
      background: #e9ecef;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }
    .city-tag:hover { background: #dee2e6; }
    .city-tag.active { background: #764ba2; color: white; }
    
    .section { margin-bottom: 20px; }
    .section-title { font-size: 16px; font-weight: bold; color: #333; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 2px solid #eee; }
    .wuxing-list { display: flex; flex-direction: column; gap: 8px; }
    .wuxing-item { display: flex; align-items: center; padding: 12px; border-radius: 10px; background: #f8f9fa; }
    .wuxing-item .emoji { font-size: 20px; margin-right: 12px; }
    .wuxing-item .level { font-weight: bold; width: 50px; }
    .wuxing-item .color { flex: 1; text-align: right; }
    .wuxing-item.color-green { background: linear-gradient(90deg, #c8e6c9 0%, #e8f5e9 100%); border-left: 4px solid #43a047; }
    .wuxing-item.color-red { background: linear-gradient(90deg, #ffcdd2 0%, #ffebee 100%); border-left: 4px solid #e53935; }
    .wuxing-item.color-yellow { background: linear-gradient(90deg, #fff9c4 0%, #fffde7 100%); border-left: 4px solid #f9a825; }
    .wuxing-item.color-white { background: linear-gradient(90deg, #eceff1 0%, #fafafa 100%); border-left: 4px solid #b0bec5; }
    .wuxing-item.color-black { background: linear-gradient(90deg, #cfd8dc 0%, #eceff1 100%); border-left: 4px solid #546e7a; }
    .weather-card { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; }
    .weather-main { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .weather-temp { font-size: 48px; font-weight: bold; }
    .weather-info { text-align: right; }
    .weather-text { font-size: 18px; }
    .weather-tip { background: rgba(255,255,255,0.2); border-radius: 10px; padding: 12px; margin-top: 12px; font-size: 13px; line-height: 1.6; }
    .weather-tip-title { font-weight: bold; margin-bottom: 4px; }
    .weather-detail { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; font-size: 14px; }
    .weather-detail div { text-align: center; }
    .advice-list { display: flex; flex-direction: column; gap: 8px; }
    .advice-item { padding: 12px; background: #f8f9fa; border-radius: 8px; font-size: 14px; }
    
    /* 24小时预报 */
    .hourly-scroll {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding-bottom: 8px;
      -webkit-overflow-scrolling: touch;
    }
    .hourly-scroll::-webkit-scrollbar { height: 4px; }
    .hourly-scroll::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 2px; }
    .hourly-scroll::-webkit-scrollbar-thumb { background: #ccc; border-radius: 2px; }
    .hourly-card {
      flex: 0 0 auto;
      width: 70px;
      text-align: center;
      padding: 12px 8px;
      background: #f8f9fa;
      border-radius: 12px;
      font-size: 13px;
    }
    .hourly-card.now { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
    .hourly-card .time { font-weight: bold; margin-bottom: 4px; }
    .hourly-card .icon { font-size: 24px; margin: 4px 0; }
    .hourly-card .temp { font-size: 16px; font-weight: bold; }
    .hourly-card .text { font-size: 11px; color: #666; margin-top: 2px; }
    .hourly-card.now .text { color: rgba(255,255,255,0.8); }
    
    .footer { text-align: center; margin-top: 20px; font-size: 12px; color: #999; }
    .loading { text-align: center; padding: 40px; color: #666; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🔮 五行穿衣指南<span class="alert-icon"></span></h1>
      <div class="date" id="date"></div>
      <div class="date-nav">
        <button class="date-nav-btn" id="prevDateBtn" onclick="changeDate(-1)" title="前一天">‹</button>
        <button class="date-nav-btn" id="todayBtn" onclick="resetDate()">今天</button>
        <button class="date-nav-btn" id="nextDateBtn" onclick="changeDate(1)" title="后一天">›</button>
        <span class="date-nav-label" id="dateOffsetLabel">今天</span>
      </div>
      <div class="ganzhi" id="ganzhi"></div>
    </div>

    <div class="top-bar">
      <div class="city-name" id="cityName">北京</div>
      <div class="top-actions">
        <button class="icon-btn" id="locateBtn" onclick="locateCity()" title="定位当前位置">📍</button>
        <button class="icon-btn" onclick="location.href='settings.html'" title="设置">⚙️</button>
      </div>
    </div>

    <div class="city-tags" id="cityTags"></div>

    <div class="weather-card" id="weatherCard">
      <div class="loading">加载中...</div>
    </div>

    <div class="section">
      <div class="section-title">🎨 五行穿衣排序</div>
      <div class="wuxing-list" id="wuxingList"></div>
    </div>

    <div class="section">
      <div class="section-title" id="adviceTitle">💡 今日穿搭建议</div>
      <div class="advice-list" id="adviceList"></div>
    </div>

    <div class="section">
      <div class="section-title" id="hourlyTitle">⏰ 未来24小时预报</div>
      <div class="hourly-scroll" id="hourlyList"></div>
    </div>

    <div class="footer">
      数据来源：和风天气 | 五行穿衣基于传统干支历法
    </div>
  </div>

  <script>
    const API_BASE = window.location.origin;
    const CITIES_API = `${API_BASE}/cities`;
    
    // 默认城市
    const DEFAULT_CITY = { name: '北京', id: '101010100' };
    const MIN_DATE_OFFSET = -2;
    const MAX_DATE_OFFSET = 30;
    let selectedDateKey = getTodayKey();
    let currentCity = DEFAULT_CITY;

    // 天气图标映射
    const WEATHER_ICONS = {
      '晴': '☀️', '多云': '⛅', '阴': '☁️',
      '小雨': '🌦️', '中雨': '🌧️', '大雨': '⛈️', '暴雨': '⛈️',
      '小雪': '🌨️', '中雪': '❄️', '大雪': '❄️', '暴雪': '❄️',
      '雷阵雨': '⛈️', '阵雨': '🌦️',
      '雾': '🌫️', '霾': '🌫️', '浮尘': '🌫️',
    };

    function getWeatherIcon(text) {
      for (const [key, icon] of Object.entries(WEATHER_ICONS)) {
        if (text.includes(key)) return icon;
      }
      return '🌤️';
    }

    function getTodayKey() {
      const now = new Date();
      const beijingTime = new Date(now.getTime() + (8 * 60 * 60 * 1000));
      const year = beijingTime.getUTCFullYear();
      const month = String(beijingTime.getUTCMonth() + 1).padStart(2, '0');
      const day = String(beijingTime.getUTCDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    }

    function parseDateKey(key) {
      const [year, month, day] = key.split('-').map(Number);
      return new Date(Date.UTC(year, month - 1, day));
    }

    function formatDateKey(date) {
      const year = date.getUTCFullYear();
      const month = String(date.getUTCMonth() + 1).padStart(2, '0');
      const day = String(date.getUTCDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    }

    function addDays(key, days) {
      const date = parseDateKey(key);
      date.setUTCDate(date.getUTCDate() + days);
      return formatDateKey(date);
    }

    function getDateOffset(key) {
      return Math.round((parseDateKey(key) - parseDateKey(getTodayKey())) / (1000 * 60 * 60 * 24));
    }

    function getDateOffsetLabel(offset) {
      if (offset === 0) return '今天';
      if (offset === -1) return '昨天';
      if (offset === -2) return '前天';
      if (offset === 1) return '明天';
      if (offset === 2) return '后天';
      return offset > 0 ? `${offset}天后` : `${Math.abs(offset)}天前`;
    }

    function updateDateControls() {
      const offset = getDateOffset(selectedDateKey);
      document.getElementById('prevDateBtn').disabled = offset <= MIN_DATE_OFFSET;
      document.getElementById('nextDateBtn').disabled = offset >= MAX_DATE_OFFSET;
      document.getElementById('todayBtn').disabled = offset === 0;
      document.getElementById('dateOffsetLabel').textContent = getDateOffsetLabel(offset);
      document.getElementById('adviceTitle').textContent = offset === 0 ? '💡 今日穿搭建议' : '💡 当日穿搭建议';
      document.getElementById('hourlyTitle').textContent = offset === 0 ? '⏰ 未来24小时预报' : '⏰ 24小时预报';
    }

    function changeDate(delta) {
      const nextKey = addDays(selectedDateKey, delta);
      const offset = getDateOffset(nextKey);
      if (offset < MIN_DATE_OFFSET || offset > MAX_DATE_OFFSET) return;
      selectedDateKey = nextKey;
      loadCity(currentCity.name, currentCity.id);
    }

    function resetDate() {
      selectedDateKey = getTodayKey();
      loadCity(currentCity.name, currentCity.id);
    }

    function normalizeCities(cities) {
      const list = Array.isArray(cities) ? cities : [];
      if (!list.find(c => c.id === DEFAULT_CITY.id)) {
        list.unshift(DEFAULT_CITY);
      }
      return list;
    }

    // 获取保存的城市列表
    async function getCities() {
      try {
        const resp = await fetch(CITIES_API);
        const data = await resp.json();
        if (data.code === '200') return normalizeCities(data.cities);
      } catch (err) {
        console.error('城市列表读取失败:', err);
      }
      return normalizeCities([]);
    }

    // 渲染城市标签
    async function renderCities(currentId) {
      const cities = await getCities();
      document.getElementById('cityTags').innerHTML = cities.map(city => 
        `<button class="city-tag ${city.id === currentId ? 'active' : ''}" 
                 onclick="switchCity('${city.name}', '${city.id}')">${city.name}</button>`
      ).join('');
    }

    function switchCity(name, id) {
      currentCity = { name, id };
      localStorage.setItem('wuxing_current_city', JSON.stringify(currentCity));
      loadCity(name, id);
    }

    // 加载城市数据
    async function loadCity(name, id) {
      currentCity = { name, id };
      document.getElementById('cityName').textContent = name;
      document.getElementById('weatherCard').innerHTML = '<div class="loading">加载中...</div>';
      document.getElementById('hourlyList').innerHTML = '';
      updateDateControls();
      await renderCities(id);

      try {
        const resp = await fetch(`${API_BASE}/api?location=${id}&date=${selectedDateKey}`);
        const data = await resp.json();
        
        if (data.code !== '200') throw new Error('数据获取失败');

        document.getElementById('date').textContent = data.date;
        document.getElementById('ganzhi').textContent = 
          `${data.ganZhi.gan}${data.ganZhi.zhi}日（${data.wuXingName}日）`;
        
        selectedDateKey = data.selectedDate || selectedDateKey;
        updateDateControls();
        renderWeather(data.weather, data.hourly, data.weatherMode);
        renderWuxing(data.wuXing);
        renderAdvice(data.advice);
        renderHourly(data.hourly);
      } catch (err) {
        console.error(err);
        document.getElementById('weatherCard').innerHTML = 
          '<div class="loading">数据加载失败，请稍后重试</div>';
      }
    }

    function renderWeather(weather, hourly, weatherMode) {
      if (!weather) {
        removeAlertIcon();
        document.getElementById('weatherCard').innerHTML = `
          <div class="weather-main">
            <div>
              <div class="weather-text">暂无天气数据</div>
              <div class="weather-tip" style="margin-top: 12px;">当前仅显示所选日期的五行穿衣信息，天气预报暂无数据。</div>
            </div>
          </div>`;
        return;
      }

      const badWeather = detectBadWeather(hourly);
      const alertIcon = badWeather.length > 0 ? badWeather[0].icon : '';
      
      removeAlertIcon();
      if (alertIcon) {
        const titleEl = document.querySelector('.header h1');
        const iconSpan = document.createElement('span');
        iconSpan.className = 'alert-icon';
        iconSpan.textContent = alertIcon;
        titleEl.appendChild(iconSpan);
      }
      
      let tipHtml = '';
      if (badWeather.length > 0) {
        const timeRange = formatBadWeatherTimes(badWeather);
        const weatherTypes = [...new Set(badWeather.map(b => b.text))].join('、');
        tipHtml = `
          <div class="weather-tip">
            <div class="weather-tip-title">⚠️ 温馨提示</div>
            <div>${timeRange} 将出现${weatherTypes}，出门请记得带伞/注意安全！</div>
          </div>`;
      }

      if (weatherMode === 'daily') {
        tipHtml = `
          <div class="weather-tip">
            <div class="weather-tip-title">📅 日预报</div>
            <div>未来日期显示当天预报，实时体感和未来24小时只在今天可用。</div>
          </div>`;
      }

      document.getElementById('weatherCard').innerHTML = `
        <div class="weather-main">
          <div class="weather-temp">${weather.temp}°C</div>
          <div class="weather-info">
            <div class="weather-text">${weather.text}</div>
            <div>${weather.feelsLike ? `体感 ${weather.feelsLike}°C` : '日间预报'}</div>
          </div>
        </div>
        <div class="weather-detail">
          <div>💧 ${weather.humidity}%</div>
          <div>🌬️ ${weather.windDir}${weather.windScale}级</div>
          <div>☁️ 云量 ${weather.cloud}%</div>
        </div>
        ${tipHtml}`;
    }

    function removeAlertIcon() {
      const titleEl = document.querySelector('.header h1');
      const existingIcon = titleEl.querySelector('.alert-icon');
      if (existingIcon) existingIcon.remove();
    }

    function detectBadWeather(hourly) {
      const badWeatherHours = [];
      const now = new Date();
      
      for (const h of hourly) {
        const time = new Date(h.fxTime);
        if (time < now) continue;
        
        const text = h.text;
        if (text.includes('雨') || text.includes('雪') || text.includes('雷') || 
            text.includes('雾') || text.includes('霾') || text.includes('暴')) {
          const hour = String(time.getHours()).padStart(2, '0');
          badWeatherHours.push({
            day: getRelativeDayLabel(time),
            hour: `${hour}:00`,
            text: text,
            icon: getWeatherIcon(text)
          });
        }
      }
      return badWeatherHours;
    }

    function getRelativeDayLabel(time) {
      const today = new Date();
      today.setHours(0, 0, 0, 0);

      const target = new Date(time);
      target.setHours(0, 0, 0, 0);

      const diffDays = Math.round((target - today) / (1000 * 60 * 60 * 24));
      if (diffDays === 0) return '今天';
      if (diffDays === 1) return '明天';
      if (diffDays === 2) return '后天';
      return `${target.getMonth() + 1}月${target.getDate()}日`;
    }

    function formatBadWeatherTimes(badWeather) {
      const grouped = new Map();

      for (const item of badWeather) {
        if (!grouped.has(item.day)) grouped.set(item.day, []);
        grouped.get(item.day).push(item.hour);
      }

      return [...grouped.entries()]
        .map(([day, hours]) => `${day} ${hours.join('、')}`)
        .join('；');
    }

    function renderHourly(hourly) {
      if (!hourly || hourly.length === 0) {
        document.getElementById('hourlyList').innerHTML = '<div class="loading">所选日期暂无24小时预报</div>';
        return;
      }

      const now = new Date();
      const futureHourly = hourly.filter(h => new Date(h.fxTime) >= now).slice(0, 24);
      const displayHourly = futureHourly.length > 0 ? futureHourly : hourly.slice(0, 24);
      
      document.getElementById('hourlyList').innerHTML = displayHourly.map((h, i) => {
        const time = new Date(h.fxTime);
        const hour = String(time.getHours()).padStart(2, '0');
        const isNow = i === 0;
        const icon = getWeatherIcon(h.text);
        
        return `
          <div class="hourly-card ${isNow ? 'now' : ''}">
            <div class="time">${isNow ? '现在' : hour + ':00'}</div>
            <div class="icon">${icon}</div>
            <div class="temp">${h.temp}°</div>
            <div class="text">${h.text}</div>
          </div>`;
      }).join('');
    }

    function renderWuxing(list) {
      document.getElementById('wuxingList').innerHTML = list.map(item => `
        <div class="wuxing-item ${getWuxingColorClass(item.color)}">
          <span class="emoji">${item.emoji}</span>
          <span class="level">${item.level}</span>
          <span class="color">${item.colorName}</span>
        </div>`).join('');
    }

    function getWuxingColorClass(color) {
      const classMap = {
        '绿': 'color-green',
        '红': 'color-red',
        '黄': 'color-yellow',
        '白': 'color-white',
        '黑': 'color-black'
      };
      return classMap[color] || '';
    }

    function renderAdvice(list) {
      document.getElementById('adviceList').innerHTML = list.map(a => 
        `<div class="advice-item">${a}</div>`
      ).join('');
    }

    // 定位功能
    async function locateCity() {
      const btn = document.getElementById('locateBtn');
      btn.classList.add('locating');
      
      if (!navigator.geolocation) {
        alert('您的浏览器不支持定位功能');
        btn.classList.remove('locating');
        return;
      }

      navigator.geolocation.getCurrentPosition(
        async (position) => {
          const { latitude, longitude } = position.coords;
          console.log('定位成功:', latitude, longitude);
          
          try {
            // 使用经纬度查询城市信息
            const resp = await fetch(`${API_BASE}/api?location=${longitude},${latitude}`);
            const data = await resp.json();
            
            if (data.code === '200' && data.cityName) {
              // 保存定位城市
              const city = { name: data.cityName, id: data.cityId };
              let cities = await getCities();
              const existIndex = cities.findIndex(c => c.id === city.id);
              if (existIndex === -1) {
                cities.push(city);
                await saveCities(cities);
              }
              
              // 切换到定位城市
              currentCity = city;
              localStorage.setItem('wuxing_current_city', JSON.stringify(city));
              loadCity(city.name, city.id);
            } else {
              // 直接用经纬度加载天气
              loadWeatherByCoords(latitude, longitude);
            }
          } catch (err) {
            console.error(err);
            alert('定位查询失败，请重试');
          }
          
          btn.classList.remove('locating');
        },
        (error) => {
          console.error('定位失败:', error);
          let msg = '定位失败';
          if (error.code === 1) msg = '请允许定位权限';
          else if (error.code === 2) msg = '无法获取位置信息';
          else if (error.code === 3) msg = '定位超时，请重试';
          alert(msg);
          btn.classList.remove('locating');
        },
        { enableHighAccuracy: true, timeout: 10000 }
      );
    }

    // 直接用经纬度加载天气
    async function loadWeatherByCoords(lat, lon) {
      try {
        const resp = await fetch(`${API_BASE}/api?location=${lon},${lat}&date=${selectedDateKey}`);
        const data = await resp.json();
        
        if (data.code !== '200') throw new Error('数据获取失败');

        document.getElementById('date').textContent = data.date;
        document.getElementById('ganzhi').textContent = 
          `${data.ganZhi.gan}${data.ganZhi.zhi}日（${data.wuXingName}日）`;
        document.getElementById('cityName').textContent = data.cityName || '当前位置';
        
        selectedDateKey = data.selectedDate || selectedDateKey;
        updateDateControls();
        renderWeather(data.weather, data.hourly, data.weatherMode);
        renderWuxing(data.wuXing);
        renderAdvice(data.advice);
        renderHourly(data.hourly);
      } catch (err) {
        console.error(err);
        alert('天气查询失败');
      }
    }

    async function saveCities(cities) {
      const normalized = normalizeCities(cities);
      const resp = await fetch(CITIES_API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ cities: normalized })
      });
      const data = await resp.json();
      if (data.code !== '200') throw new Error(data.message || '城市列表保存失败');
      return data.cities;
    }

    // 初始化
    function init() {
      const saved = localStorage.getItem('wuxing_current_city');
      const current = saved ? JSON.parse(saved) : DEFAULT_CITY;
      currentCity = current;
      selectedDateKey = getTodayKey();
      loadCity(current.name, current.id);
    }

    init();
  </script>
</body>
</html>
